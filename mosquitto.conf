# Mosquitto config — TLS only
# Broker runs on friend's laptop (172.20.10.2)
# This file is a reference; the actual broker uses the config in cg4002-b01-capstone/mosquitto/

listener 8883 0.0.0.0
protocol mqtt
cafile C:/capstone_repo/cg4002-b01-capstone/mosquitto/mosquitto-certs/ca.crt
certfile C:/capstone_repo/cg4002-b01-capstone/mosquitto/mosquitto-certs/server.crt
keyfile C:/capstone_repo/cg4002-b01-capstone/mosquitto/mosquitto-certs/server.key
allow_anonymous true
